<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <style>
    /* Global styles */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #6dd5ed, #2193b0);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 3rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* Input group */
    .input-group {
      display: flex;
      margin-bottom: 20px;
      max-width: 400px;
      width: 100%;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 15px;
      border-radius: 5px 0 0 5px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      border: none;
      background-color: #0d3b66;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 0 5px 5px 0;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #145374;
    }

    /* Weather card */
    #result {
      background-color: rgba(255, 255, 255, 0.85);
      color: #000;
      border-radius: 15px;
      padding: 25px 20px;
      max-width: 350px;
      width: 100%;
      text-align: center;
      display: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    #result.show {
      display: block;
      transform: scale(1.05);
    }

    #result h2 {
      margin: 0 0 10px 0;
    }

    #result p {
      margin: 8px 0;
      font-size: 1.1rem;
    }

    /* Responsive */
    @media(max-width: 480px) {
      h1 { font-size: 2.2rem; }
      input[type="text"], button { font-size: 14px; padding: 10px; }
      #result p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <h1>🌤 Weather App</h1>

  <div class="input-group">
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>
  </div>

  <div id="result">
    <h2 id="cityName"></h2>
    <p id="temp"></p>
    <p id="desc"></p>
    <p id="humidity"></p>
    <p id="wind"></p>
  </div>

  <script>
    // ✅ Your API key is implemented here
    const apiKey = "43de32c17e6189786ef8d5a9cb8232ee";

    async function getWeather() {
      const city = document.getElementById("city").value.trim();
      if (!city) { alert("Please enter a city name"); return; }

      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.cod === "404") {
          alert("City not found. Check spelling.");
          document.getElementById("result").style.display = "none";
          return;
        }
        if (data.cod === "401") {
          alert("Invalid API key!");
          document.getElementById("result").style.display = "none";
          return;
        }

        const result = document.getElementById("result");
        result.classList.add("show");
        document.getElementById("cityName").textContent = `${data.name}, ${data.sys.country}`;
        document.getElementById("temp").textContent = `🌡 Temperature: ${data.main.temp} °C`;
        document.getElementById("desc").textContent = `🌥 Condition: ${data.weather[0].description}`;
        document.getElementById("humidity").textContent = `💧 Humidity: ${data.main.humidity}%`;
        document.getElementById("wind").textContent = `💨 Wind Speed: ${data.wind.speed} m/s`;
      } catch (error) {
        alert("Error fetching weather. Check internet.");
        console.error(error);
      }
    }
  </script>

</body>
</html>
